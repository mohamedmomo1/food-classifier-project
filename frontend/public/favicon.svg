<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#667eea" opacity="0.1"/>

  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#4ecca7" stroke-width="6"/>

  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#2a8659" stroke-width="2" opacity="0.5"/>

  <!-- Apple shape with gradient -->
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d35f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecca7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Apple -->
  <path d="M 85 65 Q 70 50 80 45 Q 95 40 95 55 Q 95 75 80 90 Q 65 100 85 65 Z" fill="url(#appleGrad)"/>
  <circle cx="95" cy="65" r="2" fill="#2a8659"/>

  <!-- Fork -->
  <line x1="105" y1="80" x2="120" y2="45" stroke="#4ecca7" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="45" x2="112" y2="125" stroke="#4ecca7" stroke-width="3" stroke-linecap="round"/>
  <circle cx="112" cy="135" r="2" fill="#4ecca7"/>
  <line x1="105" y1="55" x2="115" y2="60" stroke="#4ecca7" stroke-width="2"/>

  <!-- Leaf accent -->
  <path d="M 88 60 Q 82 55 88 50 Q 94 55 88 60 Z" fill="#a8d35f" opacity="0.9"/>

  <!-- Fork prongs detail -->
  <line x1="112" y1="60" x2="108" y2="75" stroke="#4ecca7" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="50" x2="116" y2="80" stroke="#4ecca7" stroke-width="1.5" opacity="0.6"/>
</svg>